<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Dark background with subtle gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Outer ring (globe / web) -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.95"/>

  <!-- Horizontal meridian (web/network feel) -->
  <ellipse cx="64" cy="64" rx="38" ry="14" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.55"/>

  <!-- Vertical meridian -->
  <ellipse cx="64" cy="64" rx="14" ry="38" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.55"/>

  <!-- Shield in front -->
  <path d="M64 36 L88 46 L88 68 C88 82 78 92 64 96 C50 92 40 82 40 68 L40 46 Z"
        fill="#0f172a"
        stroke="url(#ring)"
        stroke-width="3.5"
        stroke-linejoin="round"/>

  <!-- Checkmark inside shield -->
  <path d="M52 66 L60 74 L78 56"
        fill="none"
        stroke="#10b981"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
