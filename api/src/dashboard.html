<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weave Protocol — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      background: #050505;
      color: #fafafa;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --bg-page: #050505;
      --bg-card: #0e0e0e;
      --bg-card-hover: #161616;
      --bg-elevated: #1a1a1a;
      --border: #1f1f1f;
      --border-strong: #2e2e2e;
      --text-primary: #fafafa;
      --text-secondary: #a3a3a3;
      --text-muted: #525252;
      --accent-red: #dc2626;
      --accent-red-bg: rgba(220, 38, 38, 0.08);
    }
    header {
      border-bottom: 1px solid var(--border);
      background: #080808;
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(8px);
    }
    .header-inner {
      max-width: 1280px; margin: 0 auto;
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
    .brand h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .brand-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .header-meta { display: flex; align-items: center; gap: 16px; font-size: 11px; }
    .live-pill {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-primary); font-weight: 500;
      font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-primary);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .header-meta a { color: var(--text-secondary); text-decoration: none; }
    .header-meta a:hover { color: var(--text-primary); }

    main { max-width: 1280px; margin: 0 auto; padding: 28px; }
    section { margin-bottom: 28px; }
    .section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
    }

    .hierarchy {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      overflow: hidden;
    }
    .hierarchy-svg { width: 100%; height: auto; display: block; }
    .surface-card-active rect.card-bg { fill: #0e0e0e; stroke: #2e2e2e; }
    .surface-card-inactive { opacity: 0.32; }
    .surface-card-inactive rect.card-bg { fill: #0a0a0a; stroke: #1f1f1f; }

    .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
    .card-panel {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .panel-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .panel-meta { font-size: 10px; color: var(--text-muted); }

    .activity-feed { max-height: 420px; overflow-y: auto; }
    .activity-feed::-webkit-scrollbar { width: 6px; }
    .activity-feed::-webkit-scrollbar-track { background: transparent; }
    .activity-feed::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    .activity-empty { padding: 32px 18px; text-align: center; color: var(--text-muted); font-size: 12px; }

    .event-row {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      border-left: 2px solid transparent;
      transition: background 0.15s;
      animation: slide-in 0.3s ease-out;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .event-row:hover { background: var(--bg-card-hover); }
    .event-row:last-child { border-bottom: 0; }
    .event-row.k-allow { border-left-color: var(--border-strong); }
    .event-row.k-deny, .event-row.k-ipi_detected {
      border-left-color: var(--accent-red);
      background: var(--accent-red-bg);
    }
    .event-row.k-require_approval { border-left-color: #525252; }
    .event-row.k-scan { border-left-color: var(--border); }
    @keyframes slide-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    .event-icon {
      width: 16px; text-align: center; font-size: 13px;
      color: var(--text-secondary); line-height: 1.4; flex-shrink: 0;
    }
    .event-row.k-deny .event-icon, .event-row.k-ipi_detected .event-icon { color: var(--accent-red); }
    .event-row.k-allow .event-icon { color: var(--text-primary); }
    .event-body { flex: 1; min-width: 0; }
    .event-line1 {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 12px; margin-bottom: 2px;
    }
    .event-kind {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-secondary);
    }
    .event-row.k-deny .event-kind, .event-row.k-ipi_detected .event-kind { color: var(--accent-red); }
    .event-row.k-allow .event-kind { color: var(--text-primary); }
    .event-time { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
    .event-subject {
      font-size: 13px; color: var(--text-primary);
      margin-bottom: 4px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .event-meta { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
    .surface-tag {
      padding: 2px 6px; background: var(--bg-elevated); border-radius: 3px;
      color: var(--text-secondary); font-size: 10px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }

    .ward-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
    .ward-field { display: flex; flex-direction: column; gap: 2px; }
    .ward-key {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .ward-val { font-size: 12px; color: var(--text-primary); }
    .ward-source {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 11px; color: var(--text-secondary); word-break: break-all;
    }
    .ward-divider { height: 1px; background: var(--border); }
    .ward-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .ward-stat { text-align: center; }
    .ward-stat-num {
      font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--text-primary);
    }
    .ward-stat-num.deny { color: var(--accent-red); }
    .ward-stat-label {
      font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-muted); margin-top: 2px;
    }
    .behavioral-list { display: flex; flex-direction: column; gap: 6px; }
    .behavioral-item {
      font-size: 11px; color: var(--text-secondary);
      display: flex; justify-content: space-between;
    }
    .behavioral-item span { color: var(--text-primary); font-variant-numeric: tabular-nums; }
    .ward-empty { padding: 24px 0; text-align: center; }
    .ward-empty .icon { font-size: 24px; margin-bottom: 8px; opacity: 0.5; }
    .ward-empty .msg { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .ward-empty .hint { font-size: 11px; color: var(--text-muted); }

    .stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px;
    }
    .stat-num {
      font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--text-primary); letter-spacing: -0.02em;
    }
    .stat-num.deny { color: var(--accent-red); }
    .stat-label {
      font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted); margin-top: 4px;
    }

    footer {
      max-width: 1280px; margin: 32px auto 0;
      padding: 20px 28px; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--text-muted);
    }

    @media (max-width: 900px) {
      .two-col { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>

<script type="module">
  const POLL_INTERVAL_MS = 5000;
  const SURFACE_ORDER = ['mcp', 'claude-code', 'antigravity', 'msaf', 'browser'];

  const escapeHtml = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  const rel = ts => {
    const d = Math.floor((Date.now() - ts) / 1000);
    if (d < 10) return 'just now';
    if (d < 60) return `${d}s ago`;
    if (d < 3600) return `${Math.floor(d/60)}m ago`;
    if (d < 86400) return `${Math.floor(d/3600)}h ago`;
    return `${Math.floor(d/86400)}d ago`;
  };
  const ICONS = { allow: '✓', deny: '✗', ipi_detected: '☠', require_approval: '⚠', scan: '○' };
  const SVG_NS = 'http://www.w3.org/2000/svg';

  // ─── Hierarchy: update SVG cards from snapshot ─────────
  function updateHierarchy(surfaces, ward) {
    // Update WARD policy node
    document.getElementById('ward-name').textContent =
      ward.loaded ? (ward.name || '(unnamed)') : 'no WARD.md loaded';
    document.getElementById('ward-meta').textContent =
      ward.loaded ? `v${ward.version || '1.0'} · agent: ${ward.agent || '(none)'}` : '';

    // Map surface ID to card element
    const byId = {};
    for (const s of surfaces) byId[s.id] = s;

    for (const id of SURFACE_ORDER) {
      const surface = byId[id];
      const card = document.getElementById(`card-${id}`);
      const connector = document.getElementById(`conn-${id}`);
      if (!card) continue;

      const active = surface && surface.status === 'live';

      // Card opacity + bg
      if (active) {
        card.classList.remove('surface-card-inactive');
        card.classList.add('surface-card-active');
        if (connector) {
          connector.setAttribute('stroke', '#404040');
          connector.removeAttribute('stroke-dasharray');
        }
      } else {
        card.classList.add('surface-card-inactive');
        card.classList.remove('surface-card-active');
        if (connector) {
          connector.setAttribute('stroke', '#262626');
          connector.setAttribute('stroke-dasharray', '3 3');
        }
      }

      // Status badge
      const badgeGroup = card.querySelector('.status-badge');
      badgeGroup.innerHTML = '';
      if (active) {
        const bg = document.createElementNS(SVG_NS, 'rect');
        bg.setAttribute('x', '138'); bg.setAttribute('y', '16');
        bg.setAttribute('width', '46'); bg.setAttribute('height', '20');
        bg.setAttribute('rx', '3'); bg.setAttribute('fill', '#1a1a1a');
        bg.setAttribute('stroke', '#404040');
        badgeGroup.appendChild(bg);

        const dot = document.createElementNS(SVG_NS, 'circle');
        dot.setAttribute('cx', '146'); dot.setAttribute('cy', '26'); dot.setAttribute('r', '2.5');
        dot.setAttribute('fill', '#fafafa');
        const anim = document.createElementNS(SVG_NS, 'animate');
        anim.setAttribute('attributeName', 'opacity');
        anim.setAttribute('values', '1;0.3;1');
        anim.setAttribute('dur', '2s');
        anim.setAttribute('begin', `${(SURFACE_ORDER.indexOf(id) * 0.4)}s`);
        anim.setAttribute('repeatCount', 'indefinite');
        dot.appendChild(anim);
        badgeGroup.appendChild(dot);

        const txt = document.createElementNS(SVG_NS, 'text');
        txt.setAttribute('x', '154'); txt.setAttribute('y', '29');
        txt.setAttribute('font-family', '-apple-system, system-ui, sans-serif');
        txt.setAttribute('font-size', '9'); txt.setAttribute('font-weight', '600');
        txt.setAttribute('letter-spacing', '0.08em'); txt.setAttribute('fill', '#fafafa');
        txt.textContent = 'LIVE';
        badgeGroup.appendChild(txt);
      } else {
        const bg = document.createElementNS(SVG_NS, 'rect');
        bg.setAttribute('x', '138'); bg.setAttribute('y', '16');
        bg.setAttribute('width', '46'); bg.setAttribute('height', '20');
        bg.setAttribute('rx', '3'); bg.setAttribute('fill', '#0e0e0e');
        bg.setAttribute('stroke', '#1f1f1f');
        badgeGroup.appendChild(bg);

        const txt = document.createElementNS(SVG_NS, 'text');
        txt.setAttribute('x', '161'); txt.setAttribute('y', '29');
        txt.setAttribute('text-anchor', 'middle');
        txt.setAttribute('font-family', '-apple-system, system-ui, sans-serif');
        txt.setAttribute('font-size', '9'); txt.setAttribute('font-weight', '600');
        txt.setAttribute('letter-spacing', '0.08em'); txt.setAttribute('fill', '#a3a3a3');
        txt.textContent = surface && surface.status === 'idle' ? 'IDLE' : 'OFF';
        badgeGroup.appendChild(txt);
      }

      // Count + delta + labels
      const countEl = card.querySelector('.card-count');
      const countLabelEl = card.querySelector('.card-count-label');
      const deltaEl = card.querySelector('.card-delta');
      const deltaLabelEl = card.querySelector('.card-delta-label');

      if (active && surface) {
        countEl.textContent = surface.eventsToday.toLocaleString();
        countLabelEl.textContent = 'EVENTS TODAY';
        deltaEl.textContent = `${surface.delta >= 0 ? '+' : ''}${surface.delta}%`;
        deltaLabelEl.textContent = 'vs yesterday';
      } else if (surface) {
        countEl.textContent = '—';
        countLabelEl.textContent = 'NOT CONFIGURED';
        deltaEl.textContent = '';
        deltaLabelEl.textContent = '';
      }
    }
  }

  // ─── Activity feed ─────────────────────────────────────
  function renderActivity(events) {
    const root = document.getElementById('activity-feed');
    if (!events || events.length === 0) {
      root.innerHTML = '<div class="activity-empty">No activity recorded yet. Run an agent to populate the feed.</div>';
      return;
    }
    root.innerHTML = events.map(e => `
      <div class="event-row k-${e.kind}">
        <span class="event-icon">${ICONS[e.kind] || '·'}</span>
        <div class="event-body">
          <div class="event-line1">
            <span class="event-kind">${e.kind.replace('_', ' ')}</span>
            <span class="event-time">${rel(e.timestamp)}</span>
          </div>
          <div class="event-subject">${escapeHtml(e.subject)}</div>
          <div class="event-meta">
            <span class="surface-tag">${escapeHtml(e.surface)}</span>
            <span>${escapeHtml(e.reason || '')}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ─── WARD panel ────────────────────────────────────────
  function renderWardPanel(w) {
    const root = document.getElementById('ward-panel');
    if (!w.loaded) {
      root.innerHTML = `
        <div class="ward-empty">
          <div class="icon">·</div>
          <div class="msg">No WARD.md loaded</div>
          <div class="hint">Drop a WARD.md in your project root or set $WEAVE_WARD_PATH</div>
        </div>`;
      return;
    }
    root.innerHTML = `
      <div class="ward-field"><div class="ward-key">Source</div><div class="ward-source">${escapeHtml(w.source)}</div></div>
      ${w.name ? `<div class="ward-field"><div class="ward-key">Name</div><div class="ward-val">${escapeHtml(w.name)}</div></div>` : ''}
      ${w.agent ? `<div class="ward-field"><div class="ward-key">Agent</div><div class="ward-val">${escapeHtml(w.agent)}</div></div>` : ''}
      <div class="ward-divider"></div>
      <div class="ward-grid">
        <div class="ward-stat"><div class="ward-stat-num">${w.network.allow}</div><div class="ward-stat-label">net allow</div></div>
        <div class="ward-stat"><div class="ward-stat-num deny">${w.network.deny}</div><div class="ward-stat-label">net deny</div></div>
        <div class="ward-stat"><div class="ward-stat-num">${w.capabilities.allow}</div><div class="ward-stat-label">cap allow</div></div>
        <div class="ward-stat"><div class="ward-stat-num deny">${w.capabilities.deny}</div><div class="ward-stat-label">cap deny</div></div>
      </div>
      ${w.behavioralLimits ? `
      <div class="ward-divider"></div>
      <div class="ward-field">
        <div class="ward-key">Behavioral limits</div>
        <div class="behavioral-list" style="margin-top: 6px;">
          ${w.behavioralLimits.maxIterations ? `<div class="behavioral-item">Max iterations <span>${w.behavioralLimits.maxIterations}</span></div>` : ''}
          ${w.behavioralLimits.maxRuntimeSeconds ? `<div class="behavioral-item">Max runtime <span>${w.behavioralLimits.maxRuntimeSeconds}s</span></div>` : ''}
          ${w.behavioralLimits.maxCostUSD ? `<div class="behavioral-item">Max cost <span>$${Number(w.behavioralLimits.maxCostUSD).toFixed(2)}</span></div>` : ''}
        </div>
      </div>` : ''}
    `;
  }

  // ─── Stats grid ────────────────────────────────────────
  function renderStats(s) {
    document.getElementById('stats-grid').innerHTML = [
      { label: 'Decisions', value: s.decisions, deny: false },
      { label: 'Allows', value: s.allows, deny: false },
      { label: 'Denies', value: s.denies, deny: true },
      { label: 'Approvals', value: s.approvalsRequested, deny: false },
      { label: 'IPI detected', value: s.ipiDetected, deny: true },
      { label: 'URLs scanned', value: s.urlsScanned, deny: false },
    ].map(it => `
      <div class="stat-card">
        <div class="stat-num${it.deny ? ' deny' : ''}">${it.value.toLocaleString()}</div>
        <div class="stat-label">${it.label}</div>
      </div>
    `).join('');
  }

  // ─── Polling ───────────────────────────────────────────
  document.getElementById('poll-secs').textContent = String(POLL_INTERVAL_MS / 1000);

  async function tick() {
    try {
      const res = await fetch('/api/dashboard/snapshot');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const snap = await res.json();
      updateHierarchy(snap.surfaces, snap.ward);
      renderActivity(snap.events);
      renderWardPanel(snap.ward);
      renderStats(snap.stats);
      document.getElementById('last-updated').textContent =
        `updated ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      console.error('snapshot fetch failed:', err);
      document.getElementById('last-updated').textContent = '⚠ snapshot fetch failed';
    }
  }

  tick();
  setInterval(tick, POLL_INTERVAL_MS);
</script>

</body>
</html>
