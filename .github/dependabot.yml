# Dependabot config for Weave Protocol monorepo
#
# Strategy:
#   - Weekly updates (Mondays) — frequent enough to catch CVEs fast,
#     infrequent enough to avoid PR storms
#   - Grouped: TypeScript+@types, ESLint family, AWS SDK, build tools
#   - Security updates: daily, ungrouped (escalate fast)
#   - GitHub Actions also monitored

version: 2

updates:
  # ─── GitHub Actions ──────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
    open-pull-requests-limit: 3

  # ─── Python package: weave-protocol-llamaindex ───────────
  - package-ecosystem: "pip"
    directory: "/llamaindex-py"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "python"
      - "llamaindex-py"
    commit-message:
      prefix: "deps(llamaindex-py)"
    open-pull-requests-limit: 3
    groups:
      python-dev-deps:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # ─── npm packages (14 of them) ───────────────────────────
  # Each gets its own entry. Shared structure via YAML anchors isn't
  # supported in Dependabot, so we repeat — but with consistent groups.

  - package-ecosystem: "npm"
    directory: "/mund"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "npm"
      - "mund"
    commit-message:
      prefix: "deps(mund)"
      include: "scope"
    open-pull-requests-limit: 3
    versioning-strategy: "increase"
    groups:
      typescript-and-types:
        patterns:
          - "typescript"
          - "@types/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      modelcontextprotocol:
        patterns:
          - "@modelcontextprotocol/*"
      dev-deps-minor-patch:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      prod-deps-minor-patch:
        dependency-type: "production"
        update-types: ["minor", "patch"]

